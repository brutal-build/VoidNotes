name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: void-notes-installer
          path: release/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: void-notes-installer
          path: release/
      - run: node scripts/gen-latest-yml.cjs
      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $lines = Get-Content CHANGELOG.md
          $out = New-Object System.Collections.Generic.List[string]
          $capture = $false
          foreach ($line in $lines) {
            if ($line -match "^## v$([regex]::Escape($version))\b") { $capture = $true; $out.Add($line); continue }
            if ($capture -and $line -match "^## ") { break }
            if ($capture) { $out.Add($line) }
          }
          $out -join "`n" | Set-Content -Path release-notes.md -Encoding utf8
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - Expanded
          body_path: release-notes.md
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
